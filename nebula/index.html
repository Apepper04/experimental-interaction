<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Nebula Generator</title>
    <style>
      body {
        margin: 0;
        background: #000000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: sans-serif;
      }
      #controls {
        margin-top: 16px;
        display: flex;
        gap: 12px;
      }
      button {
        background: #333355;
        color: #aaaaff;
        border: 1px solid #aaaaff;
        padding: 10px 24px;
        font-size: 13px;
        font-weight: bold;
        letter-spacing: 0.15em;
        cursor: pointer;
        text-transform: uppercase;
      }
      button:hover {
        background: #aaaaff;
        color: #000000;
      }
    </style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.2/p5.min.js"></script>
    <script src="sketch.js"></script>
    <div id="controls">
      <button onclick="generateNebula()">Generate</button>
      <button onclick="saveNebula()">Save PNG</button>
    </div>
  </body>
</html>
